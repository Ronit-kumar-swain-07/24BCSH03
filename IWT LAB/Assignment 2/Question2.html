<html>
	<head>
		<title>TimeTable</title>
		<style>
        table {
            border-collapse: collapse;
            width: 70%;
            margin: auto;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid;
            text-align: center;
            padding: 12px;
            vertical-align: middle;
        }
    </style>
	</head>
	<body>
		<h1><center><u>Time Table</u></center></h1>
		<table align="center" width=800 height=200 border=1 cellpadding=5 >
			<tr align="center">
				<th colspan=4> Class TimeTable</th>
			</tr>
			<tr align="center">
				<th>Day</th>
				<th>9:00 - 11:00</th>
				<th>11:00 - 1:00</th>
				<th>2:00 - 4:00</th>
			</tr>
			<tr align="center">
				<td><b>Monday</b></td>
				<td rowspan=2>Compuer Networks Lab</td>
				<td>Mathematics</td>
				<td>Database</td>
			</tr>
			<tr align="center">
				<td><b>Tuesday</b></td>
				<td>Operating System</td>
				<td>Web Technology</td>
			</tr>
			<tr align="center">
				<td><b>Wednesday</b></td>
				<td>Mathematics</td>
				<td colspan=2>Mini Project</td>
			</tr>
			<tr align="center">
				<td><b>Thursday</b></td>
				<td>Database</td>
				<td>Operating System</td>
				<td>Web Technology</td>
			</tr>
			<tr align="center">
				<td><b>Friday</b></td>
				<td colspan=3>Seminar & Workshop</td>
			</tr>
		</table>
	</body>
</html>
