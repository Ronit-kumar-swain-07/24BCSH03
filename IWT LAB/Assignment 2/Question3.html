<html>
	<head>
	<title>Online Registration Form</title>
	</head>
	<body>
		<h2> Online Registration Form</h2>
		<form>
		Full Name: <input type="text" name="fullname"><br><br>
		Email: <input type="email" name="email"><br><br>
		Password: <input type="password" name="password"><br><br>
		
		<p>Select your Gender:</p>
		<input type="radio" id="male" name="gender" value="male">
		<label for="male"> Male</label><br>
		<input type="radio" id="female" name="gender" value="female">
		<label for="female"> Female</label><br>
		<input type="radio" id="other" name="gender" value="other">
		<label for="other"> Other</label><br><br>
		<p>Select your Date of Birth:</p>
		<input type="date" name="dob"><br><br>
		
		<label for="course">Choose a Course:</label>
		<select id="course" name="Course">
        <option value="btech">B.TECH</option>
        <option value="mtech">M.TECH</option>
        <option value="mca">MCA</option>
		<option value="mba">MBA</option>
		</select><br><br>
		
		<p>Select your interests:</p>
		<input type="checkbox" id="interest1" name="interest1" value="html">
		<label for="interest1"> HTML</label><br>
		<input type="checkbox" id="interest2" name="interest2" value="css">
		<label for="interest2"> CSS</label><br>
		<input type="checkbox" id="interest3" name="interest3" value="javascript">
		<label for="interest3"> JavaScript</label><br>
		<input type="checkbox" id="interest4" name="interest4" value="python">
		<label for="interest4"> Python</label><br>
		<input type="checkbox" id="interest5" name="interest5" value="java">
		<label for="interest5"> Java</label><br><br>
		
		Address:<textarea rows="4" cols="40"></textarea><br><br>
		
		Upload Resume:<input type="file"><br><br>
		
		<input type="submit" value="Submit"><br><br>
		<input type="reset" value="Reset"><br>
		</form>
	</body>
</html>
