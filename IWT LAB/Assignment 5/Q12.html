<html>
<head>
    <title>Fibonacci</title>
    <script>
        function Fibonacci(n) {
            let a = 0, b = 1;
            let fib = [];
            for (let i = 0; i < n; i++) {
                fib.push(a);
                let next = a + b;
                a = b;
                b = next;
            }
            return fib;
        }
        let result = Fibonacci(10);
        document.write("<h1>Fibonacci Series: " + result + "</h1>");
    </script>
</head>
<body bgcolor="cyan" text="red">
</body>
</html>
