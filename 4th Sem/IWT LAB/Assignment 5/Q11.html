<html>
<head>
    <title>Reverse</title>
    <script>
        function reverseArray(x) {
            let rev = [];
            for (let i = x.length - 1; i >= 0; i--) {
                rev.push(x[i]);
            }
            return rev;
        }
        let x = [1, 21, 13, 4, 6];
        document.write("<h1>The Original Array is: " + x + "</h1>");
        document.write("<h1>The Reversed Array is: " + reverseArray(x) + "</h1>");
    </script>
</head>
<body bgcolor="cyan" text="red">
</body>
</html>
