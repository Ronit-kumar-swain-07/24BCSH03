<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Section</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: Snow;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        h1 { color: DarkSlateGray; margin-bottom: 30px; }

        .product-grid {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .product-card {
            background-color: White;
            border: 1px solid LightGray;
            border-radius: 10px;
            padding: 15px;
            flex: 1;
            box-shadow: 2px 2px 10px Silver;
        }

        .product-card img {
            width: 100%;
            height: 150px;
            background-color: LightSteelBlue;
            border-radius: 5px;
            object-fit: cover;
			transition: transform 0.3s ease-in-out;
        }
		
		.product-card img:hover {
			transform: translateY(-20px);
		}
			
        .product-card h3 {
            font-size: 18px;
            color: Black;
            margin: 15px 0 10px;
        }

        .product-card p {
            color: DimGray;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .add-btn {
            background-color: #45a049;
            color: White;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
		
		button:hover {
            background-color: OrangeRed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Featured Products</h1>
        
        <div class="product-grid">
            <div class="product-card">
                <img src="C:\Users\SILICON\Documents\24BCSH03\Assignment 4\s25U.jpg" alt="Product 1">
                <h3>Samsung S25 Ultra</h3>
                <p>$150000</p>
                <button class="add-btn">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src=""Desktop\College\24BCSH03\4th Sem\IWT LAB\OP15.jpg"" alt="Product 2">
                <h3>Iphone 17 Pro Max</h3>
                <p>$100000</p>
                <button class="add-btn">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="C:\Users\SILICON\Documents\24BCSH03\Assignment 4\OP15.jpg" alt="Product 3">
                <h3>OnePlus 15</h3>
                <p>$75000</p>
                <button class="add-btn">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="C:\Users\SILICON\Documents\24BCSH03\Assignment 4\IQ15.jpg" alt="Product 4">
                <h3>IQOO 15</h3>
                <p>$70000</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </div>
    </div>

</body>
</html>
