<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile</title>
    <link rel="stylesheet" href="Q5.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <div class="profile-card">
        <div class="profile-image-container">
            <img src="hitler.jpg" alt="John Doe" class="profile-img">
        </div>
        <div class="profile-details">
            <h1 class="name">John Doe</h1>
            <p class="bio">A passionate web developer who loves building interactive websites.</p>
            <div class="contact-info">
                <p><i class="fas fa-envelope icon"></i>✉ john.doe@example.com</p>
                <p><i class="fas fa-phone icon"></i>📞 +91-9876543210</p>
            </div>
        </div>
    </div>
</body>
</html>
