<!-- 7.	Create a registration form with fields for  Name, Gender (radio button), Mobile, Address (textarea), Country (dropdown), Email, and Password. 
Use external JS to apply form validation to check:

a.	None of the fields should be empty.
b.	Mobile number should be a 10-digit valid mobile number.
c.	Email should have a valid format.
d.	Length of the password must be between 6-15. -->

<!DOCTYPE html>
<html>

<head>
    <title>Registration Form</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            text-align: center;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: black;
            color: white;
            border: none;
            font-size: 16px;
        }

        .gender {
            display: flex;
            gap: 20px;
            margin: 10px 0;
        }
    </style>

</head>

<body>
    <div class="container">
        <h2>Registration Form</h2>
        <form onsubmit="return validateForm()">
            <label>Name</label>
            <input type="text" id="name">
            <label>Gender</label>
            <div class="gender">
                <label><input type="radio" name="gender" value="Male"> Male</label>
                <label><input type="radio" name="gender" value="Female"> Female</label>
            </div>
            <br><br>
            <label>Mobile</label>
            <input type="text" id="mobile">
            <label>Address</label>
            <textarea id="address"></textarea>
            <label>Country</label>
            <select id="country">
                <option value="">Select Country</option>
                <option>India</option>
                <option>USA</option>
                <option>UK</option>
                <option>Australia</option>
                <option>UAE</option>
                <option>Canada</option>
                <option>South Africa</option>
            </select>
            <label>Email</label>
            <input type="text" id="email">
            <label>Password</label>
            <input type="password" id="password">
            <button type="submit">Register</button>
        </form>
    </div>

<script src="Q7.js"></script>

</body>

</html>
