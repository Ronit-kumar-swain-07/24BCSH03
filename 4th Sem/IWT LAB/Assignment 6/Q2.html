<!-- 2.	Write a paragraph of text and a button. When the button is clicked, 
toggle the visibility of the paragraph (show ? hide ? show). Change the button text accordingly. -->

<html>
    <head>
        <title>Question 2</title>
        <script>
            function togglevis() {
                let p = document.getElementById('para');
                let b = document.getElementById('btn');

                if (p.style.display === "none") {
                    p.style.display = "block";
                    b.innerText = "Hide";
                }
                else {
                    p.style.display = "none";
                    b.innerText = "Show";
                }
            }
        </script>
    </head>
    <body>
        <p id="para">This is a Paragraph</p>
        <button id = "btn" onclick="togglevis()">Hide</button>
    </body>
</html>
