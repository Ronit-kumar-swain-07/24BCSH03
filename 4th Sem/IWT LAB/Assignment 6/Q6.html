<!-- 6.	You are tasked with building a currency converter app that allows users to convert amounts between different currencies. 
The app should have dropdown menus for selecting the source and target currencies, an input field for entering the amount to be converted,
and an output field for displaying the converted amount.The conversion rates to be used are as follows:
conversionRates = {
USD: { EUR: 0.93, GBP: 0.82, INR: 82.74, AUD: 1.47 },
EUR: { USD: 1.08, GBP: 0.88, INR: 89.06, AUD: 1.58 },
GBP: { USD: 1.22, EUR: 1.14, INR: 101.5, AUD: 1.80 },
INR: { USD: 0.012, EUR: 0.011, GBP: 0.0098, AUD: 0.018 },
AUD: { USD: 0.68, EUR: 0.63, GBP: 0.55, INR: 55.87 }
};
The app should display an error message if any of the fields are empty or if the "From" and "To" currencies are the same. -->

<html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Currency Converter</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        select,
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        #error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Currency Converter</h2>

        <div id="error"></div>

        <label>From:</label>
        <select id="fromCurrency">
            <option value="">Select</option>
            <option>USD</option>
            <option>EUR</option>
            <option>GBP</option>
            <option>INR</option>
            <option>AUD</option>
        </select>

        <input type="number" id="amount" placeholder="Enter amount">

        <label>To:</label>
        <select id="toCurrency">
            <option value="">Select</option>
            <option>USD</option>
            <option>EUR</option>
            <option>GBP</option>
            <option>INR</option>
            <option>AUD</option>
        </select>

        <input type="text" id="result" placeholder="Converted amount" readonly>

        <button onclick="convertCurrency()">Convert</button>

    </div>

    <script>
        const conversionRates = {
            USD: { EUR: 0.93, GBP: 0.82, INR: 82.74, AUD: 1.47 },
            EUR: { USD: 1.08, GBP: 0.88, INR: 89.06, AUD: 1.58 },
            GBP: { USD: 1.22, EUR: 1.14, INR: 101.5, AUD: 1.80 },
            INR: { USD: 0.012, EUR: 0.011, GBP: 0.0098, AUD: 0.018 },
            AUD: { USD: 0.68, EUR: 0.63, GBP: 0.55, INR: 55.87 }
        };

        function convertCurrency() {

            let from = document.getElementById("fromCurrency").value;
            let to = document.getElementById("toCurrency").value;
            let amount = document.getElementById("amount").value;
            let result = document.getElementById("result");
            let error = document.getElementById("error");

            error.innerText = "";

            if (from == "" || to == "" || amount == "") {
                error.innerText = "Please fill all fields.";
                result.value = "";
                return;
            }

            if (from === to) {
                error.innerText = "From and To currencies cannot be the same.";
                result.value = "";
                return;
            }
            let rate = conversionRates[from][to];
            let converted = amount * rate;
            result.value = converted.toFixed(2);
        }
    </script>

</body>

</html>
